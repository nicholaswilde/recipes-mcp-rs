version: '3'

dotenv: ['.env']

tasks:
  encrypt:
    desc: Encrypt files using SOPS
    preconditions:
      - sh: test -f .env
        msg: ".env file doens't exist"
    cmds:
      - sops -e --input-type dotenv --output-type dotenv .env > .env.enc

  decrypt:
    desc: Decrypt files using SOPS
    preconditions:
      - sh: test -f .env.enc
        msg: ".env.enc doesn't exist"
    cmds:
      - sops -d --input-type dotenv --output-type dotenv .env.enc > .env

  setup:
    desc: Setup the project
    cmds:
      - cargo check

  run:
    desc: Run the project
    cmds:
      - cargo run

  build:
    desc: Build the project natively
    cmds:
      - cargo build

  build:local:
    desc: Build the project natively (alias for build)
    cmds:
      - task: build

  build:amd64:
    desc: Cross-compile the project for AMD64 (x86_64-unknown-linux-gnu)
    cmds:
      - cross build --target x86_64-unknown-linux-gnu --release

  build:arm64:
    desc: Cross-compile the project for ARM64 (aarch64-unknown-linux-gnu)
    cmds:
      - cross build --target aarch64-unknown-linux-gnu --release

  build:armv7:
    desc: Cross-compile the project for ARMv7 (armv7-unknown-linux-gnueabihf)
    cmds:
      - cross build --target armv7-unknown-linux-gnueabihf --release

  build:armv6:
    desc: Cross-compile the project for ARMv6 (arm-unknown-linux-gnueabihf)
    cmds:
      - cross build --target arm-unknown-linux-gnueabihf --release

  docker:build:
    desc: Build the Docker image
    cmds:
      - docker build -t recipes-mcp-rs .

  docker:run:
    desc: Run the Docker image
    cmds:
      - docker run -i --rm recipes-mcp-rs

  test:
    desc: Run all tests
    cmds:
      - CI=true cargo test --tests --lib --profile ci

  test:ci:
    desc: Run tests for CI (includes linting and formatting)
    cmds:
      - task: lint
      - task: format:check
      - task: test

  lint:
    desc: Run clippy
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  format:
    desc: Format the code
    cmds:
      - cargo fmt

  format:check:
    desc: Check code formatting
    cmds:
      - cargo fmt -- --check

  test-coverage:
    desc: Run tests and generate coverage report
    cmds:
      - cargo tarpaulin --ignore-tests

  coverage:
    desc: Run tests and show coverage summary
    cmds:
      - cargo llvm-cov --workspace --all-features --summary-only

  coverage:report:
    desc: Generate coverage reports (lcov and html)
    cmds:
      - cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - cargo llvm-cov --workspace --all-features --html

  coverage:upload:
    desc: Upload coverage report to Coveralls
    precondition:
      - sh: test -f lcov.info
        msg: "lcov.info doesn't exist"
    cmds:
      - coveralls report lcov.info  -n -r {{ .COVERALLS_REPO_TOKEN }}
    silent: true

  default:
    cmds:
      - task -l
    silent: true
