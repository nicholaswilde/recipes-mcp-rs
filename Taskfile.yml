version: '3'

tasks:
  setup:
    desc: Setup the project
    cmds:
      - cargo check

  run:
    desc: Run the project
    cmds:
      - cargo run

  build:
    desc: Build the project
    cmds:
      - cargo build

  test:
    desc: Run all tests
    cmds:
      - CI=true cargo test --tests --profile ci

  test:ci:
    desc: Run tests for CI (includes linting and formatting)
    cmds:
      - task: lint
      - task: format:check
      - task: test

  lint:
    desc: Run clippy
    cmds:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  format:
    desc: Format the code
    cmds:
      - cargo fmt

  format:check:
    desc: Check code formatting
    cmds:
      - cargo fmt -- --check

  test-coverage:
    desc: Run tests and generate coverage report
    cmds:
      - cargo tarpaulin --ignore-tests
